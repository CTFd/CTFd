<div role="tabpanel" class="tab-pane config-section" id="robots">
	<form method="POST" enctype="multipart/form-data">
		<div class="form-group">
			<label>
				{% trans %}Robots.txt{% endtrans %}
				<small class="form-text text-muted">
					{% trans %}The{% endtrans %} <code>robots.txt</code> {% trans %}file contains instructions that suggest to bots which webpages they should and should not access. Not all bots respect{% endtrans %} <code>robots.txt</code>.
				</small>
			</label>
			<textarea class="form-control" id="theme-footer" name="robots_txt" rows="7">{{ robots_txt or "User-agent: *\nDisallow: /admin\n" }}</textarea>
		</div>
		<button type="submit" class="btn btn-md btn-primary float-right">{% trans %}Update{% endtrans %}</button>
	</form>
</div>
